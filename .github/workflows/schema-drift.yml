name: Schema drift (PNCP / BrasilAPI)

# Detects breaking changes in upstream API response shapes.
# Compares live field names against tests/fixtures/schema-baseline.json.
# - MISSING fields → opens issue (we depend on those)
# - NEW fields    → log only (passthrough handles them)
#
# Runs every Monday at 12:00 UTC = 09:00 BRT.

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      breaking: ${{ steps.check.outputs.breaking }}
      diff: ${{ steps.check.outputs.diff }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Compare live schema vs baseline
        id: check
        run: |
          set +e
          npm run schema:check 2>&1 | tee schema-output.txt
          status=${PIPESTATUS[0]}
          set -e

          {
            echo "diff<<EOF"
            grep -E "^(✓|✗|ℹ|⚠) " schema-output.txt | head -50
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$status" -ne 0 ]; then
            echo "breaking=true" >> "$GITHUB_OUTPUT"
          else
            echo "breaking=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: schema-output
          path: schema-output.txt
          retention-days: 30

  alert:
    needs: drift
    if: needs.drift.outputs.breaking == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Open issue for breaking schema change
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIFF: ${{ needs.drift.outputs.diff }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list --label schema-drift --state open --json number --jq '.[0].number' --limit 1 || echo "")

          BODY=$(cat <<MSG
          A breaking schema change was detected in upstream APIs (PNCP or BrasilAPI).

          ### Diff
          \`\`\`
          ${DIFF}
          \`\`\`

          ### What "breaking" means here
          One or more fields that the baseline at \`tests/fixtures/schema-baseline.json\`
          declared are now missing from the live response. Code paths that read
          those fields will return undefined.

          ### How to triage
          1. Check the [full run](${RUN_URL}) for context
          2. Open the affected adapter / schema in \`src/schemas/\`
          3. If the field was renamed → update the schema and the dependent tools
          4. If the field was removed → mark as optional or remove the dependency
          5. Re-run \`npm run schema:snapshot > tests/fixtures/schema-baseline.json\` to update baseline
          6. Open a PR with the fix

          (Auto-generated by .github/workflows/schema-drift.yml)
          MSG
          )

          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "${BODY}"
          else
            gh issue create \
              --title "[schema-drift] Breaking change in upstream API" \
              --label "schema-drift,bug,triage" \
              --body "${BODY}"
          fi
