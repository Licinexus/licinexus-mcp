<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1280px; height: 720px;
      background: #0d0d1a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
    }
    .logo {
      width: 540px; height: auto;
      display: block;
      margin: 0 auto 50px;
    }
    .tagline {
      font-size: 28px;
      font-weight: 400;
      color: #ffa500;
      letter-spacing: 0.5px;
    }
    .sub {
      margin-top: 18px;
      font-size: 18px;
      color: #888;
      letter-spacing: 1px;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      margin: 0 4px;
      border: 1px solid #333;
      border-radius: 4px;
      color: #aaa;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="center">
    <img class="logo" src="../../.github/assets/logo-white.png" alt="Licinexus">
    <div class="tagline">Open source MCP for Brazilian public procurement</div>
    <div class="sub">
      <span class="badge">PNCP</span>
      <span class="badge">Receita Federal</span>
      <span class="badge">MIT</span>
      <span class="badge">16 tools</span>
    </div>
  </div>
</body>
</html>
