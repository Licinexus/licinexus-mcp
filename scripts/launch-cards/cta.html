<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1280px; height: 720px;
      background: #0d0d1a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .container {
      padding: 80px 0 0;
      text-align: center;
    }
    .logo {
      width: 220px; height: auto;
      margin-bottom: 60px;
    }
    .label {
      font-size: 18px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .install {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-size: 56px;
      color: #00ffaa;
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 50px;
    }
    .url {
      font-size: 26px;
      color: #fff;
      margin-bottom: 40px;
    }
    .footer {
      font-size: 17px;
      color: #666;
      letter-spacing: 0.5px;
    }
    .accent { color: #ffa500; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="../../.github/assets/logo-white.png" alt="Licinexus">
    <div class="label">Install</div>
    <div class="install">npx @licinexusbr/mcp</div>
    <div class="url">github.com/Licinexus/licinexus-mcp</div>
    <div class="footer">
      Maintained by <span class="accent">Licinexus</span>
      &nbsp;·&nbsp; PNCP + Receita Federal &nbsp;·&nbsp; MIT
    </div>
  </div>
</body>
</html>
